<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1E"/>
      <stop offset="100%" style="stop-color:#1A2235"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF87"/>
      <stop offset="100%" style="stop-color:#00D4A8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- A letter stylized -->
  <text x="256" y="360" font-family="sans-serif" font-weight="900" font-size="320" text-anchor="middle" fill="url(#letter)">A</text>
  <!-- Gold accent dot -->
  <circle cx="390" cy="160" r="24" fill="#FFD700"/>
</svg>
